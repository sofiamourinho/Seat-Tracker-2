<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McGill Seat Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h1 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 24px;
        }
        p {
            color: #7f8c8d;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #34495e;
            font-weight: 600;
            font-size: 13px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #c0392b;
        }
        #message {
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>McGill Seat Tracker 🤖</h1>
    <p>Get an instant SMS notification the millisecond a seat or waitlist spot opens up.</p> 
    <form id="alertForm">
        <label for="term">Select Academic Term</label>
        <select id="term" required>
            <option value="202609">Fall 2026</option>
            <option value="202701">Winter 2027</option>
            <option value="202705">Summer 2027</option>
        </select>
        <label for="phone">Phone Number (With Country Code)</label>
        <input type="tel" id="phone" placeholder="ex. +14165551234" required>
        <div style="display: flex; gap: 12px;">
            <div style="flex: 1;">
                <label for="subject">Subject Code</label>
                <input type="text" id="subject" placeholder="ex. POLI" required style="text-transform: uppercase;" maxlength="4">
            </div>
            <div style="flex: 1;">
                <label for="course_num">Course Num</label>
                <input type="text" id="course_num" placeholder="244" required maxlength="3">
            </div>
        </div>
        <label for="crn" style="margin-top: 10px;">Course CRN (4-5 Digit Code)</label>
        <input type="text" id="crn" placeholder="ex. 5459" required>        
        <button type="submit">Activate Tracker</button>
    </form>
    <div id="message"></div>
</div>
<script>
    // --- REPLACE THESE WITH YOUR ACTUAL SUPABASE KEYS ---
    const SUPABASE_URL = "https://iagkcmdhovinvuneebux.supabase.co";
    const SUPABASE_KEY = "sb_publishable_qaKK9JkrFWgJj4sDlK3bCQ_OzIb5dnw";
    // ----------------------------------------------------
    // Initialize Supabase Client (Notice the fix here)
    let supabase = window.supabase;
    supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    document.getElementById('alertForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const messageDiv = document.getElementById('message');
        const term = document.getElementById('term').value;
        const phone = document.getElementById('phone').value.trim();
        const subject = document.getElementById('subject').value.toUpperCase().trim();
        const course_num = document.getElementById('course_num').value.trim();
        const crn = document.getElementById('crn').value.trim();
        messageDiv.style.color = '#34495e';
        messageDiv.textContent = 'Activating...';
        // Insert row with our 5 clean parameters
        const { data, error } = await supabase
            .from('Seat Alert')
            .insert([{ 
                term: term,
                phone: phone, 
                subject: subject, 
                course_num: course_num, 
                crn: crn 
            }]);
        if (error) {
            console.error(error);
            messageDiv.style.color = '#e74c3c';
            messageDiv.textContent = 'Error: ' + error.message;
        } else {
            messageDiv.style.color = '#2ecc71';
            messageDiv.textContent = 'Success! Your tracker is now active.';
            document.getElementById('alertForm').reset();
        }
    });
</script>
</body>
</html>
