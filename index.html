<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McGill Course Seat Alerter</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f7f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #ed1b2f; margin-bottom: 8px; font-size: 24px; }
        p { color: #666; font-size: 14px; margin-bottom: 24px; }
        label { display: block; text-align: left; font-weight: bold; font-size: 12px; color: #444; margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #ed1b2f; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #c41222; }
        #message { margin-top: 15px; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>
<div class="card">
    <h1>McGill Seat Tracker 🤖</h1>
    <p>Get an instant SMS notification the millisecond a seat or waitlist spot opens up.</p>
    <form id="alertForm">
        <label for="phone">Phone Number (With Country Code)</label>
        <input type="tel" id="phone" placeholder="+14165551234" required>
        <label for="crn">Course CRN (4-5 Digit Code)</label>
        <input type="text" id="crn" placeholder="5459" required>   
        <button type="submit">Activate Tracker</button>
    </form>
    <div id="message"></div>
</div>
<script>
    // 1. LINK YOUR DATABASE KEYS HERE
    const SUPABASE_URL = "https://iagkcmdhovinvuneebux.supabase.co";
    const SUPABASE_KEY = "sb_publishable_qaKK9JkrFWgJj4sDlK3bCQ_OzIb5dnw"; 
    // Initialize the web client connection
    supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const form = document.getElementById('alertForm');
    const msgDiv = document.getElementById('message');
    // 2. LISTEN FOR THE SUBMIT CLICK
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msgDiv.innerText = "Connecting to tracker database...";
        msgDiv.style.color = "#666";
        const phoneInput = document.getElementById('phone').value.trim();
        const crnInput = document.getElementById('crn').value.trim();
        // 3. PUSH DATA TO SUPABASE
        const { data, error } = await supabase
            .from('Seat Alert')
            .insert([
                { phone_number: phoneInput, course_crn: crnInput }
            ]);
        if (error) {
            msgDiv.innerText = "❌ Error: " + error.message;
            msgDiv.style.color = "red";
        } else {
            msgDiv.innerText = "🚀 Success! Your tracker is active.";
            msgDiv.style.color = "green";
            form.reset();
        }
    });
</script>
</body>
</html>
